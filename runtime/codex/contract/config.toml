# Generated from codex-contract.toml. Do not edit directly.

model = "gpt-5.4"
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"

[features]
multi_agent = false

[shell_environment_policy]
include_only = [
  "PATH",
  "SystemDrive",
  "SystemRoot",
  "SYSTEMROOT",
  "TEMP",
  "TMP",
  "PATHEXT",
  "COMSPEC",
]

[agents.intake]
description = "Project-locked intake agent for task drafting"
config_file = "./agents/intake.toml"

[agents.planner]
